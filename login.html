<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth — WHRHS CS Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styleFolder/style.css">
    <link rel="stylesheet" href="styleFolder/auth.css">
</head>

<body class="auth-body">

<div class="auth-container">

    <!-- SIGN IN -->
    <div id="signInView" class="auth-card">

        <div class="auth-logo">
            <span style="color: var(--primary);">W/</span> WHRHS
        </div>

        <h2>Welcome back.</h2>
        <p class="auth-subtitle">Sign in to the member portal.</p>

        <button class="auth-google-btn" id="googleSignInBtn">
            Continue with Google
        </button>

        <div class="auth-divider"><span>OR</span></div>

        <form id="signInForm">
            <div id="signInFeedback" class="auth-feedback" hidden></div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signInEmail" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signInPassword" required>
            </div>

            <button type="submit" class="auth-submit-btn">
                Sign in <span class="arrow">→</span>
            </button>
        </form>

        <div class="auth-footer">
            <a href="#" onclick="showAuthView('forgotPasswordView'); return false;">
                Forgot password?
            </a>

            <span>
                Need an account?
                <a href="#" onclick="showAuthView('signUpView'); return false;">
                    Sign up
                </a>
            </span>
        </div>
    </div>


    <!-- SIGN UP -->
    <div id="signUpView" class="auth-card hidden">

        <a href="#" onclick="showAuthView('signInView'); return false;">
            ← Back to sign in
        </a>

        <h2>Create account</h2>
        <p class="auth-subtitle">Join the collective.</p>

        <form id="signUpForm">

            <div id="signUpFeedback" class="auth-feedback" hidden></div>

            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="signUpName" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signUpEmail" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signUpPassword" required minlength="6">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="signUpConfirm" required>
            </div>

            <button type="submit" class="auth-submit-btn">
                Create account <span class="arrow">→</span>
            </button>
        </form>
    </div>


    <!-- FORGOT PASSWORD -->
    <div id="forgotPasswordView" class="auth-card hidden">

        <a href="#" onclick="showAuthView('signInView'); return false;">
            ← Back to sign in
        </a>

        <h2>Reset password</h2>
        <p class="auth-subtitle">We'll email you a reset link.</p>

        <form id="forgotPasswordForm">

            <div id="forgotPasswordFeedback" class="auth-feedback" hidden></div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="forgotPasswordEmail" required>
            </div>

            <button type="submit" class="auth-submit-btn">
                Send link <span class="arrow">→</span>
            </button>
        </form>
    </div>

</div>

<script type="module" src="scriptFolder/login-page.js"></script>

</body>
</html>
