<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styleFolder/auth.css">
</head>
<body class="auth-body">

    <div class="auth-container">

            <div class="auth-logo">

            </div>

            <button class="auth-google-btn" id="googleSignInBtn">

                <span>Continue with Google</span>
            </button>

            <div class="auth-divider"><span>OR</span></div>

            <form id="signInForm">
                <div id="signInFeedback" class="auth-feedback" hidden></div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signInEmail" placeholder="you@whrhs.org" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signInPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-submit-btn">Sign in <span class="arrow">→</span></button>
            </form>

            <div class="auth-footer">
                <a href="#" class="auth-link" onclick="showForgotPassword(event)">Forgot password?</a>
                <span>Need an account? <a href="sign-up.html" class="auth-link bold" onclick="toggleAuthView(); return false;">Sign up</a></span>
            </div>
        </div>

        <div id="signUpView" class="auth-card hidden">
            <a href="#" class="back-link" onclick="showAuthView('signInView'); return false;">← Back to sign in</a>
            <h2>Create account</h2>
            <p class="auth-subtitle">Join the collective.</p>

            <form id="signUpForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signUpEmail" placeholder="you@whrhs.org" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signUpPassword" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signUpConfirm" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="auth-submit-btn">Create account <span class="arrow">→</span></button>
            </form>
        </div>

        <div id="forgotPasswordView" class="auth-card hidden">
            <a href="#" class="back-link" onclick="showAuthView('signInView'); return false;">← Back to sign in</a>
            <h2>Reset password</h2>
            <p class="auth-subtitle">We'll email you a secure reset link.</p>
            <form id="forgotPasswordForm">
                <div id="forgotPasswordFeedback" class="auth-feedback" hidden></div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="forgotPasswordEmail" placeholder="you@whrhs.org" required>
                </div>
                <button type="submit" class="auth-submit-btn">Send link <span class="arrow">→</span></button>
            </form>
        </div>

    </div>

    <script type="module" src="scriptFolder/auth.js"></script>
</body>
</html>
