                Continue with Google
            </button>

            <div class="auth-divider"><span>OR</span></div>

            <form id="signUpForm">
                <div id="signUpFeedback" class="auth-feedback" hidden></div>
                <div class="input-group">
                    <label>Display Name</label>
                    <input type="text" id="signUpName" placeholder="Your name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signUpEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signUpPassword" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signUpConfirm" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="auth-submit-btn">Create account</button>
            </form>

            <div class="auth-footer">
                <span>Already a member? <a href="login.html" class="auth-link bold">Sign in</a></span>
            </div>
        </div>

    </div>

    <script type="module" src="scriptFolder/sign-up.js"></script>
</body>
</html>
